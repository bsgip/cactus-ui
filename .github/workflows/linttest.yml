name: Testing and Linting
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # This will run bandit and produce a security report if there are any failures
  linting:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        pyver: ["3.12", "3.13", "3.14"]
        
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.pyver }}
      - name: Install Dependencies
        run: uv sync --extra dev --extra test
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Typing (ty)
        run: uv run ty check .
      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r src/

  # This will run pytest against the specified version
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyver: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.pyver }}

      - name: Install Dependencies
        run: uv sync --extra test

      - name: Check generated API schema is up to date
        run: |
          uv run python scripts/export_api_schema.py
          git diff --exit-code frontend/src/api/generated/schema.json \
            || (echo "::error::schema.json is stale — run 'uv run python scripts/export_api_schema.py' and commit." && exit 1)

      - name: Run Pytest
        run: uv run pytest -n auto

  # This will typecheck, lint and test the React frontend
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Check generated API types are up to date
        run: |
          npm run generate:types
          git diff --exit-code src/api/generated/types.ts \
            || (echo "::error::generated types.ts is stale — run 'npm run generate:types' and commit." && exit 1)

      - name: Unit tests (vitest)
        run: npm run test
